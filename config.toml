[project]
name = "not-an-llm"
data_dir = "data"

[collection]
# Data source: semantic_scholar or arxiv
source = "arxiv"

# Keep source-specific queries side-by-side so switching source never overwrites them.

# For arXiv, use search_query syntax (https://info.arxiv.org/help/api/user-manual.html).
arxiv_queries = [
  "cat:cs.AI", # AI
  "cat:cs.CL", # computation and language
  "cat:cs.LG", # machine learning
  # "cat:cs.MA", # multiagent systems
  # "cat:cs.CY", # computers and society
  # "cat:cs.IR", # information retrieval
]

# For Semantic Scholar, use their query syntax.
semantic_scholar_queries = [
  "(\"artificial intelligence\" OR AI) AND language:English",
  "(\"deep learning\" OR \"machine learning\") AND language:English",
  "(\"computer science\") AND language:English",
  "(\"natural language processing\" OR NLP) AND language:English",
  "(\"large language models\" OR LLM) AND language:English",
]

year_min = 2015
year_max = 2026
page_size = 50
arxiv_collection_mode = "full" # full or monthly
samples_per_month = 5 # used only when arxiv_collection_mode = "monthly"
arxiv_output_jsonl = "data/raw/arxiv_papers.jsonl"
arxiv_monthly_output_jsonl = "data/raw/arxiv_monthly_papers.jsonl"
semantic_scholar_output_jsonl = "data/raw/semantic_scholar_papers.jsonl"
# Safe request pacing for collection APIs.
min_request_interval_seconds = 3.5
max_retries = 8
initial_backoff_seconds = 3.5
max_backoff_seconds = 90.0
backoff_jitter_seconds = 0.25

# Keep fields explicit so moderation is centralized in this file.
fields = [
  "paperId",
  "title",
  "abstract",
  "year",
  "authors",
  "venue",
  "publicationDate",
  "fieldsOfStudy",
  "publicationTypes",
  "journal",
  "externalIds",
  "url",
  "tldr",
]


[analysis]
enabled = true
include_readability = true
# Defaults follow collection output basename (e.g. arxiv_papers.*).
# Keep only explicit overrides you need.
preprocessed_jsonl = ""
feature_dataset_jsonl = ""
trends_csv = ""
trends_plot_dir = ""
# Use "all" to automatically include every numeric feature in yearly trend analysis.
features = ["all"]
