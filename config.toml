[project]
name = "not-an-llm"
data_dir = "data"

[collection]
# Data source: semantic_scholar, arxiv, medarxiv, or bioarxiv
source = "arxiv"

# Keep source-specific queries side-by-side so switching source never overwrites them.

# For arXiv, use search_query syntax (https://info.arxiv.org/help/api/user-manual.html).
arxiv_queries = [
  "cat:cs.CL", # computation and language
  "cat:cs.AI", # AI
  "cat:cs.LG", # machine learning
]

# For Semantic Scholar, use their query syntax.
semantic_scholar_queries = [
  "(\"artificial intelligence\" OR AI) AND language:English",
  "(\"deep learning\" OR \"machine learning\") AND language:English",
  "(\"computer science\") AND language:English",
  "(\"natural language processing\" OR NLP) AND language:English",
  "(\"large language models\" OR LLM) AND language:English",
]

# For medRxiv, query is a local text filter over title/abstract/category.
# Use ["*"] to collect all records in the date range.
medarxiv_queries = ["*"]

# For bioRxiv, query is a local text filter over title/abstract/category.
# Use ["*"] to collect all records in the date range.
bioarxiv_queries = ["*"]

year_min = 2015
year_max = 2026
page_size = 100
arxiv_collection_mode = "full" # full or monthly
medarxiv_collection_mode = "full" # full or monthly
bioarxiv_collection_mode = "full" # full or monthly
samples_per_month = 2 # used only when *_collection_mode = "monthly"
arxiv_output_jsonl = "data/raw/arxiv_papers.jsonl"
arxiv_monthly_output_jsonl = "data/raw/arxiv_monthly_papers.jsonl"
semantic_scholar_output_jsonl = "data/raw/semantic_scholar_papers.jsonl"
medarxiv_output_jsonl = "data/raw/medarxiv_papers.jsonl"
bioarxiv_output_jsonl = "data/raw/bioarxiv_papers.jsonl"
# Safe request pacing for collection APIs.
min_request_interval_seconds = 3.5
max_retries = 10
initial_backoff_seconds = 3.5
max_backoff_seconds = 120.0
backoff_jitter_seconds = 0.25

# Keep fields explicit so moderation is centralized in this file.
fields = [
  "paperId",
  "title",
  "abstract",
  "year",
  "authors",
  "venue",
  "publicationDate",
  "fieldsOfStudy",
  "publicationTypes",
  "journal",
  "externalIds",
  "url",
  "tldr",
]


[analysis]
enabled = true
include_readability = true
# Select which readability metrics to compute/write.
readability_metrics = [
  "avg_words_per_sentence",
  "avg_syllables_per_word",
  "flesch_reading_ease",
  "flesch_kincaid_grade",
  "dale_chall"
]

# Defaults follow collection output basename (e.g. arxiv_papers.*).
# Keep only explicit overrides you need.
preprocessed_jsonl = ""
feature_dataset_jsonl = ""
trends_csv = ""
monthly_trends_csv = ""
trends_plot_dir = ""
# Use "all" to automatically include every numeric feature in yearly trend analysis.
features = ["all"]

spacy_features = [
  "marker_list_of_three",
  "coordination_count",
  "clause_depth",
  "dependency_entropy"
]

# Configurable syntactic features: each key becomes <key>_count and <key>_per_1k_words.
[analysis.syntactic_features]
em_dash = "--"
semicolon = ";"
colon = ":"

[analysis.lexicon]
# Terms used for style ratios.
hedge_terms = ["may", "might", "could", "potentially", "suggest", "indicate", "hint"]
certainty_terms = ["demonstrate", "prove", "confirm", "groundbreaking", "pivotal", "unprecedented"]

[analysis.markers]
# Define your LLM-like vocabulary here.

llm_marker_words = [
  "delve",
  "highlight",
  "underscore",
  "enhance",
  "exhibit",
  "showcase",
  "insight",
  "comprehensive",
  "crucial",
  "pivotal",
  "intricate",
  "meticulously",
  "notably",
  "particularly",
  "while",
  "within",
  "across",
  "additionally"
]
# exact: surface form only, lemma: lemmatized.
llm_marker_word_matching = "lemma"
# Backward-compatible aliases if you prefer top-level [analysis] keys
# llm_marker_words = [...]
# llm_marker_word_matching = "exact"