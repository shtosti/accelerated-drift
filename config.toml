[project]
name = "not-an-llm"
data_dir = "data"

[collection]
# Data source: semantic_scholar, arxiv, medarxiv, or biorxiv
source = "medarxiv"

# Keep source-specific queries side-by-side so switching source never overwrites them.

# For arXiv, use search_query syntax (https://info.arxiv.org/help/api/user-manual.html).
arxiv_queries = [
  "cat:cs.CL", # computation and language
  "cat:cs.AI", # AI
  "cat:cs.LG", # machine learning
]

# For Semantic Scholar, use their query syntax.
semantic_scholar_queries = [
  "(\"artificial intelligence\" OR AI) AND language:English",
  "(\"deep learning\" OR \"machine learning\") AND language:English",
  "(\"computer science\") AND language:English",
  "(\"natural language processing\" OR NLP) AND language:English",
  "(\"large language models\" OR LLM) AND language:English",
]

# For medRxiv, query is a local text filter over title/abstract/category.
# Use ["*"] to collect all records in the date range.
medarxiv_queries = ["*"]

# For bioRxiv, query is a local text filter over title/abstract/category.
# Use ["*"] to collect all records in the date range.
biorxiv_queries = ["*"]

year_min = 2015
year_max = 2026
page_size = 100
arxiv_collection_mode = "full" # full or monthly
medarxiv_collection_mode = "full" # full or monthly
biorxiv_collection_mode = "full" # full or monthly
samples_per_month = 2 # used only when *_collection_mode = "monthly"
arxiv_output_jsonl = "data/raw/arxiv.jsonl"
arxiv_monthly_output_jsonl = "data/raw/arxiv_monthly.jsonl"
semantic_scholar_output_jsonl = "data/raw/semantic_scholar.jsonl"
medarxiv_output_jsonl = "data/raw/medarxiv.jsonl"
biorxiv_output_jsonl = "data/raw/biorxiv.jsonl"
biorxiv_monthly_output_jsonl = "data/raw/biorxiv_monthly.jsonl"
# Safe request pacing for collection APIs.
min_request_interval_seconds = 3.5
max_retries = 10
initial_backoff_seconds = 3.5
max_backoff_seconds = 120.0
backoff_jitter_seconds = 0.25

# Keep fields explicit so moderation is centralized in this file.
fields = [
  "paperId",
  "title",
  "abstract",
  "year",
  "authors",
  "venue",
  "publicationDate",
  "fieldsOfStudy",
  "publicationTypes",
  "journal",
  "externalIds",
  "url",
  "tldr",
]


[analysis]
enabled = true
generate_plots = true
include_readability = true
topic_modeling_enabled = true
topic_modeling_min_cluster_ratio = 0.0005
topic_modeling_top_n_terms = 7
topic_modeling_max_final_topics = 10
topic_modeling_use_bertopic = true
# Topic clusterer: "hdbscan" preserves density-based topics and can reduce outliers;
# "kmeans" forces every document into one of topic_modeling_kmeans_num_clusters topics.
topic_modeling_clusterer = "kmeans"
topic_modeling_num_workers = 16
topic_modeling_embedding_batch_size = 128
# Lower values reduce the size of the HDBSCAN outlier bucket; set <= 0 to use the derived default.
topic_modeling_hdbscan_min_samples = 10
# Reassign HDBSCAN -1 documents to the nearest semantic topic after dense topics are discovered.
topic_modeling_reduce_outliers = true
topic_modeling_outlier_reduction_strategy = "embeddings"
# Set > 0 to override max_final_topics when topic_modeling_clusterer = "kmeans".
topic_modeling_kmeans_num_clusters = 0
# Cluster in a richer UMAP space, then generate a separate 2D UMAP projection for plots.
topic_modeling_umap_n_components = 5
topic_modeling_plot_umap_n_components = 2
# Select which readability metrics to compute/write.
readability_metrics = [
  "avg_words_per_sentence",
  "avg_syllables_per_word",
  "flesch_reading_ease",
  "flesch_kincaid_grade",
  "dale_chall",
  "smog_index",
  "automated_readability_index",
  "gunning_fog"
]

# Full run config. Use config_mini.toml for the mini run.
preprocessed_jsonl = "data/processed/medarxiv.jsonl"
feature_dataset_jsonl = ""
trends_csv = ""
monthly_trends_csv = ""
trends_plot_dir = ""
